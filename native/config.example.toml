# stdusk config - copy to ~/.config/stdusk/config.toml and edit.
# Every field is optional; omitted fields use these defaults.

[appearance]
theme = "one-half-dark"   # used when follow_system = false. built-ins: one-half-dark | one-half-light | dracula | tokyo-night
opacity = 0.85            # window background opacity, 0.0-1.0
font_size = 13.0
follow_system = true      # switch theme with the macOS light/dark appearance
theme_light = "one-half-light"  # theme when the OS is in light mode
theme_dark = "one-half-dark"    # theme when the OS is in dark mode

[quake]
hotkey = "Ctrl+Grave"     # e.g. "F13", "Cmd+Grave", "F12", "Ctrl+Shift+T"
height_pct = 0.5          # fraction of screen height when dropped down
hide_on_focus_loss = true
hide_from_dock = true     # accessory app: no Dock icon / app-switcher entry, just drops from the top
menu_bar_icon = true      # show a menu-bar (status) icon with a Show/Hide + Quit menu
dock_when_visible = false # (macOS) show a Dock icon + real menu bar while visible, hide when parked

[terminal]
detect_progress = true    # scrape N% from output into the tab progress bar (Tabby-style)
cursor = "block"          # cursor shape: "block" | "underline" | "beam"
shell_integration = true  # inject OSC 133 hooks so a failed command marks its tab
bell = "visual"           # BEL handling: "visual" (screen flash) | "off"
detect_clis = true        # badge tabs that are running a known AI CLI (claude/codex/gemini/...)
clickable_links = true    # open URLs and file paths in the terminal on click
link_modifier = "none"    # modifier to activate links: "none" (hover) | "cmd" | "ctrl" | "alt" | "shift"
