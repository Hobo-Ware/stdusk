# stdusk config - copy to ~/.config/stdusk/config.toml and edit.
# Every field is optional; omitted fields use these defaults.

[appearance]
theme = "one-half-dark"   # used when follow_system = false. built-ins: one-half-dark | one-half-light | dracula | tokyo-night
                          # plus 204 community schemes (e.g. "nord", "solarized-dark", "gruvbox-light") and any XRDB files in ~/.config/stdusk/schemes/
opacity = 0.85            # window background opacity, 0.0-1.0
font = ""                 # terminal font FAMILY name (e.g. "JetBrainsMono Nerd Font", "Menlo"); "" = bundled default
font_size = 13.0
line_padding = 0.0        # extra pixels added to each line's height, 0-8
follow_system = true      # switch theme with the macOS light/dark appearance
theme_light = "one-half-light"  # theme when the OS is in light mode
theme_dark = "one-half-dark"    # theme when the OS is in dark mode
tab_width = "fixed"       # tab sizing: "fixed" (equal widths, Tabby-like) | "dynamic" (fit the title)

[quake]
mode = "dropdown"         # "dropdown" (drops from the top on the hotkey) | "window" (a normal
                          # resizable macOS window). Window mode DISABLES the global hotkey and
                          # ignores every focus/Dock option below - it's always a Dock app whose
                          # close button quits. The window chrome (title bar) applies on restart.
hotkey = "Ctrl+Grave"     # e.g. "F13", "Cmd+Grave", "F12", "Ctrl+Shift+T" (dropdown mode only)
height_pct = 0.5          # fraction of screen height when dropped down (dropdown mode only)
hide_on_focus_loss = true # (dropdown mode only)
follow_active_space = true # (macOS, dropdown mode only) drop onto whichever Space/desktop is active
                          # when summoned instead of jumping back to its origin Space; false pins it
hide_from_dock = true     # accessory app: no Dock icon / app-switcher entry, just drops from the top (dropdown mode only)
menu_bar_icon = true      # show a menu-bar (status) icon with a Show/Hide + Quit menu
dock_when_visible = false # (macOS, dropdown mode only) show a Dock icon + real menu bar while visible, hide when parked

[terminal]
detect_progress = true    # scrape N% from output into the tab progress bar (Tabby-style)
cursor = "block"          # cursor shape: "block" | "underline" | "beam"
shell_integration = true  # inject OSC 133 hooks so a failed command marks its tab
bell = "visual"           # BEL handling: "visual" (screen flash) | "off"
detect_clis = true        # badge tabs that are running a known AI CLI (claude/codex/gemini/...)
clickable_links = true    # open URLs and file paths in the terminal on click
link_modifier = "none"    # modifier to activate links: "none" (hover) | "cmd" | "ctrl" | "alt" | "shift"
notify_on_done = true     # desktop notification when a long (>10s) command finishes while hidden
scrollback_lines = 25000  # history size
cursor_blink = true       # blink the focused pane's cursor
alt_is_meta = false       # Option+key sends ESC+key (meta) instead of composed characters
word_separators = " ()[]{}'\""  # characters that end a double-click word selection
copy_on_select = false    # copy to the clipboard whenever a selection finishes
paste_on_middle_click = true    # middle-click pastes the clipboard
warn_on_multiline_paste = true  # confirm before pasting multiple lines (outside vim/less)
trim_whitespace_on_paste = true # strip surrounding whitespace from pastes (single-line: both ends)
replace_newlines_on_paste = false # newlines -> spaces on paste
bold_bright = true        # draw bold text in the bright ANSI colors
ligatures = false         # draw -> => != >= <= ... as single symbol glyphs (visual only)
on_exit = "close"         # pane when its shell exits: "close" | "keep" (banner, Enter restarts) | "restart" (auto-respawn)
dynamic_title = true      # tab titles follow the shell's OSC 0/2 title (cwd basename fallback)
minimum_contrast = 4.0    # nudge text toward black/white to meet this WCAG ratio vs its background;
                          # 4 = default (what Tabby ships; WCAG AA is 4.5) .. 21; set 1 to turn it
                          # off and keep your theme's cell colors exact
right_click = "menu"      # right-click on a pane: "menu" (context menu) | "paste" | "clipboard"
                          # (copy the selection, else paste); paste/clipboard hold >=250ms for the menu
focus_follows_mouse = false # hovering a split pane focuses it without clicking

[session]
restore = true            # reopen last session's tabs (cwd/title/color) on launch
resume_claude = true      # auto-resume Claude Code tabs to their prior conversation (needs restore)

[sync]
repo = ""                 # git remote for config.toml + custom schemes (keep it private); "" = off
auto = false              # with a repo set: pull once on launch, push after every settings Save

# App hotkey remapping. Chord = modifiers (Cmd/Ctrl/Alt/Shift) + a key name
# (letters, digits, F1-F20, Comma/"," Period Minus/"-" Equals/"=" Space Enter Tab
# arrows Home End PageUp PageDown ...). Omitted actions keep these defaults; "" unbinds.
# Single keys need Cmd/Ctrl/Alt (only F-keys may be bound bare). A chord that collides
# with a terminal key (e.g. Ctrl+letter) fires the action AND still reaches the shell.
# Cmd+C / Cmd+X / Cmd+V (with any extra modifiers) can't be bound - macOS folds them into
# clipboard events before the app ever sees the key, so such a bind is rejected as invalid.
# Also editable in Settings > Hotkeys. The global summon hotkey stays [quake] hotkey.
[hotkeys]
new_tab = "Cmd+T"
close = "Cmd+W"           # close focused pane; the tab on its last pane
reopen = "Cmd+Shift+T"
toggle_last_tab = "Cmd+O"
find = "Cmd+F"
palette = "Cmd+Shift+P"
settings = "Cmd+,"
broadcast = "Cmd+Shift+I" # broadcast input to every pane in the tab
split_right = "Cmd+D"
split_down = "Cmd+Shift+D"
select_all = "Cmd+A"
clear = "Cmd+K"           # wipe screen + scrollback
zoom_in = "Cmd+="
zoom_out = "Cmd+-"
zoom_reset = "Cmd+0"

# Named launch profiles (Tabby-style). Repeat the [[profiles]] block per profile;
# only `name` is required - omitted fields fall back to the regular tab defaults.
# Also editable in Settings > Profiles (list + inline editor + per-profile Launch).
# [[profiles]]
# name = "work"
# shell = "/bin/zsh"        # override $SHELL for tabs opened with this profile
# args = []                 # extra shell arguments, appended after the login/interactive flags
# cwd = "~/Git"             # starting directory; a leading ~ expands to $HOME
# env = { AWS_PROFILE = "work" }
# color = "#61afef"         # tab color
