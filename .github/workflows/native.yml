name: native (rust)

on:
  push:
    branches: [main]
    paths: ['src/**', 'Cargo.toml', 'Cargo.lock', 'build.rs', 'assets/**', 'packaging/**', '.github/workflows/native.yml']
  pull_request:
    paths: ['src/**', 'Cargo.toml', 'Cargo.lock', 'build.rs', 'assets/**', 'packaging/**', '.github/workflows/native.yml']

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --all-targets
