name: release (stdusk)

# Cut a stdusk release + Homebrew artifacts on a `stdusk-v*` tag. (Tabby's own tags are `v1.0.x`
# on master; ours are namespaced so the two release lines never collide.)
on:
  push:
    tags: ['stdusk-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. stdusk-v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14 # Apple silicon; we cross-build x86_64 and lipo into a universal binary
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: v
        run: |
          TAG="${GITHUB_REF_NAME}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && TAG="${{ inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#stdusk-v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build (both arches)
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

      - name: Assemble stdusk.app (universal)
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          mkdir -p dist
          APP="dist/stdusk.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          lipo -create -output "$APP/Contents/MacOS/stdusk" \
            target/aarch64-apple-darwin/release/stdusk \
            target/x86_64-apple-darwin/release/stdusk
          chmod +x "$APP/Contents/MacOS/stdusk"
          cp assets/stdusk.icns "$APP/Contents/Resources/stdusk.icns"
          sed "s/__VERSION__/${VERSION}/g" packaging/Info.plist > "$APP/Contents/Info.plist"

      # Developer ID signing + notarization, OPTIONAL: runs only when all five secrets are
      # configured (see packaging/README.md for the one-time setup); otherwise the release
      # ships ad-hoc signed exactly as before and the cask strips quarantine.
      - name: Sign & notarize (optional)
        id: sign
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER }}
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
        run: |
          if [ -z "$MACOS_CERT_P12" ] || [ -z "$MACOS_CERT_PASSWORD" ] || \
             [ -z "$NOTARY_KEY_ID" ] || [ -z "$NOTARY_ISSUER" ] || [ -z "$NOTARY_KEY" ]; then
            echo "Signing secrets not configured - shipping ad-hoc signed; the cask keeps its" \
                 "quarantine-strip postflight. Setup: packaging/README.md."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          APP="dist/stdusk.app"
          # Throwaway keychain holding the Developer ID Application cert for this run only.
          KC="$RUNNER_TEMP/signing.keychain-db"
          KC_PASS="$(uuidgen)"
          security create-keychain -p "$KC_PASS" "$KC"
          security set-keychain-settings -lut 3600 "$KC"
          security unlock-keychain -p "$KC_PASS" "$KC"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$MACOS_CERT_PASSWORD" \
            -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PASS" "$KC" >/dev/null
          security list-keychains -d user -s "$KC" login.keychain
          IDENTITY=$(security find-identity -v -p codesigning "$KC" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "MACOS_CERT_P12 holds no 'Developer ID Application' identity" >&2
            exit 1
          fi
          codesign --deep --force --options runtime --timestamp --sign "$IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          # Notarize with an App Store Connect API key, then staple so Gatekeeper passes offline.
          echo "$NOTARY_KEY" > "$RUNNER_TEMP/notary.p8"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/notary.p8" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER" \
            --wait
          xcrun stapler staple "$APP"
          spctl --assess --type execute -v "$APP"
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Package zip
        id: pkg
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          # Zip via ditto so the bundle (symlinks, resource forks, the notarization staple)
          # survives the round-trip. Must run AFTER signing - the sha covers the final bits.
          ZIP="stdusk-${VERSION}-universal.app.zip"
          (cd dist && ditto -c -k --sequesterRsrc --keepParent stdusk.app "$ZIP")
          SHA=$(shasum -a 256 "dist/${ZIP}" | awk '{print $1}')
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Generate Homebrew cask
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          SHA="${{ steps.pkg.outputs.sha }}"
          ZIP="${{ steps.pkg.outputs.zip }}"
          TAG="${{ steps.v.outputs.tag }}"
          # Unsigned builds need the quarantine-strip postflight (Gatekeeper hard-blocks an
          # ad-hoc signature); a signed + notarized build must NOT carry it.
          if [ "${{ steps.sign.outputs.signed }}" = "true" ]; then
            POSTFLIGHT=""
          else
            POSTFLIGHT='
            postflight do
              # Ad-hoc signed, not notarized: strip quarantine so Gatekeeper does not hard-block
              # the GUI launch. Signed releases omit this block (baked by the release workflow).
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", "#{appdir}/stdusk.app"]
            end
          '
          fi
          # A cask (not a formula) so the .app lands in /Applications and Spotlight/Launchpad find
          # it; the `binary` stanza still puts `stdusk` on the PATH.
          cat > dist/stdusk.rb <<EOF
          cask "stdusk" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/Hobo-Ware/stdusk/releases/download/${TAG}/${ZIP}"
            name "stdusk"
            desc "Native Rust quake terminal with a real GUI tab bar and ambient AI-CLI awareness"
            homepage "https://github.com/Hobo-Ware/stdusk"

            app "stdusk.app"
            binary "#{appdir}/stdusk.app/Contents/MacOS/stdusk"
          ${POSTFLIGHT}
            zap trash: "~/.config/stdusk"
          end
          EOF
          cat dist/stdusk.rb

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.v.outputs.tag }}" \
            "dist/${{ steps.pkg.outputs.zip }}" \
            "dist/stdusk.rb" \
            --title "stdusk ${{ steps.v.outputs.version }}" \
            --notes "Universal macOS \`.app\`. Install: \`brew install hobo-ware/tap/stdusk\`.

          The \`stdusk.rb\` asset is the tap cask for this build (correct sha256). It installs the
          bundle into /Applications (Spotlight-findable) and links \`stdusk\` onto your PATH.
          Drop it into the tap at \`Casks/stdusk.rb\`." \
            --verify-tag
